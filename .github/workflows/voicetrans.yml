name: Voicetrans Daily
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore processed calls cache
        uses: actions/cache@v4
        with:
          path: processed_calls.json
          key: processed-calls-v1-${{ github.run_id }}
          restore-keys: |
            processed-calls-v1-

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-cloud-speech

      - name: Set up Google credentials
        run: echo "$GOOGLE_CREDENTIALS" > key.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Run script
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=key.json
          python voicetransc.py
