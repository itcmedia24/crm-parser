name: Voicetrans Daily

on:
  schedule:
    - cron: '0 21 * * *'  # 00:00 МСК = 21:00 UTC
  workflow_dispatch:      # чтобы можно было запускать вручную

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests google-cloud-speech

      - name: Set up Google credentials
        run: echo "$GOOGLE_CREDENTIALS" > key.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}

      - name: Run script
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=key.json
          python voicetransc.py
