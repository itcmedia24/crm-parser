name: Voicetrans Daily

on:
  schedule:
    - cron: '0 21 * * *'  # 00:00 МСК = 21:00 UTC

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests google-cloud-speech

      - name: Run script
        run: python voicetransc.py
